<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: black; margin: 0; height: 100vh; width: 100vw; }
  </style>
</head>
<body>
<script>
  var audio = new Audio("NFCearRape.mp3");
  audio.loop = true;
  audio.play().catch(function() {
    document.addEventListener("touchstart", function() {
      audio.play();
    }, { once: true });
    document.addEventListener("click", function() {
      audio.play();
    }, { once: true });
  });
</script>
</body>
</html>
