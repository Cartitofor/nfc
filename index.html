<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: black;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @font-face {
  font-family: 'Playfair';
  src: url('PlayfairDisplay-VariableFont_wght.ttf');
}

p {
  color: white;
  font-size: 80px;
  font-family: 'Playfair', sans-serif;
  cursor: pointer;
}
  </style>
</head>
<body>
  <p>Tap</p>
  <script>
    var audio = new Audio("NFCearRape.mp3");
    audio.loop = true;
    document.addEventListener("click", function() {
      audio.play();
    }, { once: true });
    document.addEventListener("touchstart", function() {
      audio.play();
    }, { once: true });
  </script>
</body>
</html>
